# AI route: ai.localhost/v1/chat/completions -> NVIDIA NIM, via the
# chat-completion middleware. passHostHeader:false so the upstream sees its own
# host (required for TLS SNI to integrate.api.nvidia.com).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ai-gateway
  namespace: apps
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`ai.localhost`) && Path(`/v1/chat/completions`)
      kind: Rule
      middlewares:
        - name: content-guard-pii        # 1. deterministic regex PII block
        - name: llm-guard-safety          # 2. semantic safety (nemoguard verdict)
        - name: chatcompletion-nvidia     # 3. forward to NVIDIA NIM
      services:
        - name: nvidia-external
          port: 443
          scheme: https
          passHostHeader: false
