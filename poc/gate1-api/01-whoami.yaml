# Sample API behind Gate 1 — traefik/whoami echoes request details, so we can
# see the gateway-injected identity headers (X-User-*) after JWT validation.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  namespace: apps
  labels: { app: whoami }
spec:
  replicas: 1
  selector:
    matchLabels: { app: whoami }
  template:
    metadata:
      labels: { app: whoami }
    spec:
      containers:
        - name: whoami
          image: traefik/whoami:v1.10.3
          ports:
            - containerPort: 80
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { cpu: 100m, memory: 64Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: whoami
  namespace: apps
spec:
  selector: { app: whoami }
  ports:
    - port: 80
      targetPort: 80
