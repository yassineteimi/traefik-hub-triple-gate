# Route api.localhost -> whoami, guarded by Gate 1 middlewares (in order):
#   1. api-jwt        — reject unauthenticated requests (401)
#   2. api-ratelimit  — throttle authenticated floods (429)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: whoami-api
  namespace: apps
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`api.localhost`)
      kind: Rule
      services:
        - name: whoami
          port: 80
      middlewares:
        - name: api-jwt
        - name: api-ratelimit
