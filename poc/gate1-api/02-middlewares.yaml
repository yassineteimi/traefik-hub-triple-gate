# Gate 1 enforcement: JWT authentication + rate limiting, both declarative.

# --- JWT authentication (Traefik Hub) ---
# Validates HS256 tokens signed with the secret in apps/jwt (key signingSecret).
# On success, forwards selected claims to the backend as headers so we can prove
# the gateway authenticated the caller. forwardAuthorization:false strips the
# raw token from the upstream request.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: api-jwt
  namespace: apps
spec:
  plugin:
    jwt:
      signingSecret: "urn:k8s:secret:jwt:signingSecret"
      forwardAuthorization: false
      forwardHeaders:
        X-User-ID: sub
        X-User-Scope: scope
---
# --- Rate limiting (Traefik) ---
# Token bucket: up to `burst` requests immediately, refilling at average/period.
# Tuned low so a quick burst visibly trips HTTP 429.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: api-ratelimit
  namespace: apps
spec:
  rateLimit:
    average: 100
    period: 1m
    burst: 5
