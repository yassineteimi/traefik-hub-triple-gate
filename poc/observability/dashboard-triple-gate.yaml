# Grafana dashboard for the Triple Gate, auto-loaded by the Grafana sidecar
# (label grafana_dashboard=1). Focuses on request flow and "blocked by gate".
apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-triple-gate
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  triple-gate.json: |
    {
      "uid": "triple-gate",
      "title": "Traefik Triple Gate",
      "tags": ["traefik", "triple-gate"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "time": { "from": "now-30m", "to": "now" },
      "panels": [
        {
          "id": 1, "type": "timeseries", "title": "Request rate by route (req/s)",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [ {
            "expr": "sum by (router) (rate(traefik_router_requests_total[5m]))",
            "legendFormat": "{{router}}", "refId": "A"
          } ]
        },
        {
          "id": 2, "type": "timeseries", "title": "Blocked by gate (401 / 403) by route",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [ {
            "expr": "sum by (router, code) (rate(traefik_router_requests_total{code=~\"401|403\"}[5m]))",
            "legendFormat": "{{router}} {{code}}", "refId": "A"
          } ]
        },
        {
          "id": 3, "type": "stat", "title": "Total blocked (401+403, last 1h)",
          "gridPos": { "h": 8, "w": 6, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [ {
            "expr": "sum(increase(traefik_router_requests_total{code=~\"401|403\"}[1h]))",
            "refId": "A"
          } ],
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" },
            "thresholds": { "steps": [ { "color": "green", "value": null }, { "color": "orange", "value": 1 } ] } } }
        },
        {
          "id": 4, "type": "stat", "title": "Allowed (2xx, last 1h)",
          "gridPos": { "h": 8, "w": 6, "x": 6, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [ {
            "expr": "sum(increase(traefik_router_requests_total{code=~\"2..\"}[1h]))",
            "refId": "A"
          } ],
          "fieldConfig": { "defaults": { "color": { "mode": "fixed", "fixedColor": "green" } } }
        },
        {
          "id": 5, "type": "timeseries", "title": "p95 latency by route (s)",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [ {
            "expr": "histogram_quantile(0.95, sum by (le, router) (rate(traefik_router_request_duration_seconds_bucket[5m])))",
            "legendFormat": "{{router}}", "refId": "A"
          } ]
        },
        {
          "id": 6, "type": "stat", "title": "AI tokens used (input / output)",
          "gridPos": { "h": 7, "w": 8, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [ {
            "expr": "sum by (gen_ai_token_type) (gen_ai_client_token_usage_sum)",
            "legendFormat": "{{gen_ai_token_type}}", "refId": "A"
          } ]
        },
        {
          "id": 7, "type": "stat", "title": "Est. AI cost (USD, @ $0.20 / 1M tokens)",
          "gridPos": { "h": 7, "w": 8, "x": 8, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [ {
            "expr": "sum(gen_ai_client_token_usage_sum) * 0.20 / 1000000",
            "refId": "A"
          } ],
          "fieldConfig": { "defaults": { "unit": "currencyUSD", "decimals": 5 } }
        },
        {
          "id": 8, "type": "timeseries", "title": "LLM Guard blocks by reason",
          "gridPos": { "h": 7, "w": 8, "x": 16, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [ {
            "expr": "sum by (reason) (traefik_hub_llm_guard_requests_total{reason!=\"\"})",
            "legendFormat": "{{reason}}", "refId": "A"
          } ]
        },
        {
          "id": 9, "type": "timeseries", "title": "MCP operations by method (rate)",
          "gridPos": { "h": 7, "w": 12, "x": 0, "y": 23 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [ {
            "expr": "sum by (mcp_method_name) (rate(mcp_client_operation_duration_seconds_count[5m]))",
            "legendFormat": "{{mcp_method_name}}", "refId": "A"
          } ]
        },
        {
          "id": 10, "type": "timeseries", "title": "MCP tool-call decisions (allow=none / deny=403)",
          "gridPos": { "h": 7, "w": 12, "x": 12, "y": 23 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [ {
            "expr": "sum by (error_type) (mcp_client_operation_duration_seconds_count{mcp_method_name=\"tools/call\"})",
            "legendFormat": "err={{error_type}}", "refId": "A"
          } ]
        }
      ]
    }
