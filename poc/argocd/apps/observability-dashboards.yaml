# Grafana dashboard ConfigMaps (loaded by the Grafana sidecar). Kept separate
# from the Grafana Helm app so dashboards are plain, reviewable YAML in Git.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-dashboards
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/yassineteimi/traefik-hub-triple-gate.git
    targetRevision: main
    path: poc/observability
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - CreateNamespace=true
