# Prometheus (lean: server only). Scrapes the annotated Traefik pod (:9100) via
# the chart's built-in kubernetes-pods job, plus the OTel collector (added in M5.2).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-prometheus
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: prometheus
    targetRevision: 29.13.0   # Prometheus v3.12.0
    helm:
      valuesObject:
        fullnameOverride: prometheus
        alertmanager: { enabled: false }
        prometheus-pushgateway: { enabled: false }
        prometheus-node-exporter: { enabled: false }
        kube-state-metrics: { enabled: false }
        server:
          retention: 6h
          persistentVolume: { enabled: false }   # ephemeral - homelab
          resources:
            requests: { cpu: 50m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - CreateNamespace=true
