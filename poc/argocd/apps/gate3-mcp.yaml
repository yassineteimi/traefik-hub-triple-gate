# Gate 3 (MCP Gateway) - ArgoCD reconciles the MCP server + gateway from
# poc/gate3-mcp/ (top-level YAML only; the server/ build context is ignored as it
# holds no manifests). The container image is side-loaded into kind separately.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gate3-mcp
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/yassineteimi/traefik-hub-triple-gate.git
    targetRevision: main
    path: poc/gate3-mcp
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
